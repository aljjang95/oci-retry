name: OCI ARM Instance Retry

on:
  schedule:
    - cron: '0 */6 * * *'  # 6시간마다 (Job 만료 후 재시작용)
  workflow_dispatch: {}

concurrency:
  group: oci-retry
  cancel-in-progress: false

jobs:
  create-instances:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # 약 5시간 50분 (6시간 한도 내)
    steps:
      - uses: actions/checkout@v4

      - name: Install OCI CLI
        run: pip install oci-cli --quiet 2>/dev/null

      - name: Setup OCI Config
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CONFIG }}" > ~/.oci/config
          chmod 600 ~/.oci/config
          echo "${{ secrets.OCI_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          echo "${{ secrets.SSH_PUB_KEY }}" > ~/.oci/ssh_key.pub

      - name: Retry loop (5min intervals, ~5.5 hours)
        run: |
          mkdir -p instances
          MAX_ROUNDS=66  # 66 * 5min = 5.5 hours

          for round in $(seq 1 $MAX_ROUNDS); do
            # 남은 인스턴스 확인
            CREATED=0
            NEXT=""
            for i in 1 2 3 4; do
              if [ -f "instances/btc-trade-${i}.created" ]; then
                ((CREATED++))
              else
                [ -z "$NEXT" ] && NEXT="btc-trade-${i}"
              fi
            done

            if [ $CREATED -ge 4 ]; then
              echo "=== ALL 4 INSTANCES CREATED ==="
              break
            fi

            echo "--- Round $round/$MAX_ROUNDS ($(date '+%H:%M:%S')) | ${CREATED}/4 done | target: $NEXT ---"

            RESULT=$(oci compute instance launch \
              --compartment-id "${{ secrets.COMPARTMENT_ID }}" \
              --availability-domain "${{ secrets.AD }}" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config '{"ocpus":1,"memoryInGBs":6}' \
              --image-id "${{ secrets.IMAGE_ID }}" \
              --subnet-id "${{ secrets.SUBNET_ID }}" \
              --display-name "$NEXT" \
              --assign-public-ip true \
              --boot-volume-size-in-gbs 50 \
              --metadata "{\"ssh_authorized_keys\":\"$(cat ~/.oci/ssh_key.pub)\"}" \
              2>&1 || true)

            if echo "$RESULT" | grep -q '"lifecycle-state"'; then
              INSTANCE_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")
              echo "*** $NEXT CREATED! ***"

              sleep 30
              PUBLIC_IP="pending"
              VNIC_ID=$(oci compute vnic-attachment list \
                --compartment-id "${{ secrets.COMPARTMENT_ID }}" \
                --instance-id "$INSTANCE_ID" \
                --query 'data[0]."vnic-id"' --raw-output 2>/dev/null || echo "")
              if [ -n "$VNIC_ID" ] && [ "$VNIC_ID" != "null" ]; then
                PUBLIC_IP=$(oci network vnic get \
                  --vnic-id "$VNIC_ID" \
                  --query 'data."public-ip"' --raw-output 2>/dev/null || echo "pending")
              fi

              echo "$NEXT $INSTANCE_ID $PUBLIC_IP $(date -u '+%Y-%m-%dT%H:%M:%SZ')" > "instances/${NEXT}.created"
              echo "  IP: $PUBLIC_IP"

              # 커밋
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add instances/
              TOTAL=$(ls instances/*.created 2>/dev/null | wc -l)
              git commit -m "instance: $NEXT ($PUBLIC_IP) — ${TOTAL}/4"
              git push

              sleep 5
              continue  # 바로 다음 인스턴스 시도

            elif echo "$RESULT" | grep -q "Out of host capacity"; then
              echo "  Out of capacity."
            elif echo "$RESULT" | grep -q "LimitExceeded"; then
              echo "  OCPU limit — all 4 allocated. Done."
              break
            elif echo "$RESULT" | grep -q "Too many requests"; then
              echo "  Rate limited."
            else
              echo "  Error: $(echo "$RESULT" | grep -o '"message":"[^"]*"' | head -1)"
            fi

            echo "  Waiting 5 min..."
            sleep 300
          done

          # 최종 결과
          echo ""
          echo "==========================================="
          TOTAL=$(ls instances/*.created 2>/dev/null | wc -l)
          echo "  RESULT: ${TOTAL}/4 instances created"
          for f in instances/*.created 2>/dev/null; do
            [ -f "$f" ] && cat "$f"
          done
          echo "==========================================="
