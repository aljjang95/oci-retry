name: OCI ARM Instance Retry

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

concurrency:
  group: oci-retry
  cancel-in-progress: false

jobs:
  create-instance:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      matrix:
        instance:
          - name: btc-trade-1
            ocpus: 1
            memory: 6
            region: ap-chuncheon-1
          - name: btc-trade-2
            ocpus: 1
            memory: 6
            region: ap-chuncheon-1
          - name: btc-trade-3
            ocpus: 1
            memory: 6
            region: ap-osaka-1
          - name: btc-trade-4
            ocpus: 1
            memory: 6
            region: ap-osaka-1
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install OCI CLI
        run: pip install oci-cli --quiet 2>/dev/null

      - name: Setup OCI Config
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CONFIG }}" > ~/.oci/config
          chmod 600 ~/.oci/config
          echo "${{ secrets.OCI_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          echo "${{ secrets.SSH_PUB_KEY }}" > ~/.oci/ssh_key.pub

      - name: Setup region ${{ matrix.instance.region }}
        id: setup
        run: |
          REGION="${{ matrix.instance.region }}"
          COMPARTMENT="${{ secrets.COMPARTMENT_ID }}"

          # Get AD for this region
          AD=$(oci iam availability-domain list \
            --compartment-id "$COMPARTMENT" \
            --region "$REGION" \
            --query 'data[0].name' --raw-output 2>/dev/null)
          echo "AD=$AD"

          if [ -z "$AD" ] || [ "$AD" = "null" ]; then
            echo "ERROR: Cannot get AD for $REGION — region may not be subscribed"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Find Ubuntu 22.04 ARM image
          IMAGE_ID=$(oci compute image list \
            --compartment-id "$COMPARTMENT" \
            --region "$REGION" \
            --operating-system "Canonical Ubuntu" \
            --operating-system-version "22.04" \
            --shape "VM.Standard.A1.Flex" \
            --sort-by TIMECREATED --sort-order DESC \
            --query 'data[0].id' --raw-output 2>/dev/null)
          echo "IMAGE_ID=$IMAGE_ID"

          if [ -z "$IMAGE_ID" ] || [ "$IMAGE_ID" = "null" ]; then
            echo "ERROR: Cannot find ARM image for $REGION"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if VCN exists, create if not
          VCN_ID=$(oci network vcn list \
            --compartment-id "$COMPARTMENT" \
            --region "$REGION" \
            --display-name "btc-vcn" \
            --query 'data[0].id' --raw-output 2>/dev/null)

          if [ -z "$VCN_ID" ] || [ "$VCN_ID" = "null" ]; then
            echo "Creating VCN in $REGION..."
            VCN_ID=$(oci network vcn create \
              --compartment-id "$COMPARTMENT" \
              --region "$REGION" \
              --display-name "btc-vcn" \
              --cidr-blocks '["10.0.0.0/16"]' \
              --query 'data.id' --raw-output 2>/dev/null)
            echo "VCN created: $VCN_ID"

            # Create internet gateway
            IGW_ID=$(oci network internet-gateway create \
              --compartment-id "$COMPARTMENT" \
              --region "$REGION" \
              --vcn-id "$VCN_ID" \
              --display-name "btc-igw" \
              --is-enabled true \
              --query 'data.id' --raw-output 2>/dev/null)
            echo "IGW created: $IGW_ID"

            # Get default route table
            RT_ID=$(oci network route-table list \
              --compartment-id "$COMPARTMENT" \
              --region "$REGION" \
              --vcn-id "$VCN_ID" \
              --query 'data[0].id' --raw-output 2>/dev/null)

            # Add default route
            oci network route-table update \
              --rt-id "$RT_ID" \
              --region "$REGION" \
              --route-rules "[{\"destination\":\"0.0.0.0/0\",\"destinationType\":\"CIDR_BLOCK\",\"networkEntityId\":\"$IGW_ID\"}]" \
              --force 2>/dev/null

            # Create security list (allow SSH + all egress)
            SL_ID=$(oci network security-list list \
              --compartment-id "$COMPARTMENT" \
              --region "$REGION" \
              --vcn-id "$VCN_ID" \
              --query 'data[0].id' --raw-output 2>/dev/null)

            oci network security-list update \
              --security-list-id "$SL_ID" \
              --region "$REGION" \
              --ingress-security-rules '[{"source":"0.0.0.0/0","protocol":"6","tcpOptions":{"destinationPortRange":{"min":22,"max":22}}},{"source":"0.0.0.0/0","protocol":"6","tcpOptions":{"destinationPortRange":{"min":3030,"max":3030}}},{"source":"0.0.0.0/0","protocol":"6","tcpOptions":{"destinationPortRange":{"min":8090,"max":8090}}},{"source":"0.0.0.0/0","protocol":"6","tcpOptions":{"destinationPortRange":{"min":8891,"max":8891}}}]' \
              --egress-security-rules '[{"destination":"0.0.0.0/0","protocol":"all"}]' \
              --force 2>/dev/null
          fi
          echo "VCN_ID=$VCN_ID"

          # Check if subnet exists, create if not
          SUBNET_ID=$(oci network subnet list \
            --compartment-id "$COMPARTMENT" \
            --region "$REGION" \
            --vcn-id "$VCN_ID" \
            --display-name "btc-subnet" \
            --query 'data[0].id' --raw-output 2>/dev/null)

          if [ -z "$SUBNET_ID" ] || [ "$SUBNET_ID" = "null" ]; then
            echo "Creating subnet in $REGION..."
            SUBNET_ID=$(oci network subnet create \
              --compartment-id "$COMPARTMENT" \
              --region "$REGION" \
              --vcn-id "$VCN_ID" \
              --display-name "btc-subnet" \
              --cidr-block "10.0.0.0/24" \
              --availability-domain "$AD" \
              --query 'data.id' --raw-output 2>/dev/null)
            echo "Subnet created: $SUBNET_ID"
          fi
          echo "SUBNET_ID=$SUBNET_ID"

          # Output for next step
          echo "ad=$AD" >> $GITHUB_OUTPUT
          echo "image_id=$IMAGE_ID" >> $GITHUB_OUTPUT
          echo "subnet_id=$SUBNET_ID" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Retry ${{ matrix.instance.name }}
        if: steps.setup.outputs.skip != 'true'
        run: |
          MAX_ROUNDS=33
          WAIT=600
          RATE_EXTRA=600
          NAME="${{ matrix.instance.name }}"
          OCPUS="${{ matrix.instance.ocpus }}"
          MEMORY="${{ matrix.instance.memory }}"
          REGION="${{ matrix.instance.region }}"
          AD="${{ steps.setup.outputs.ad }}"
          IMAGE_ID="${{ steps.setup.outputs.image_id }}"
          SUBNET_ID="${{ steps.setup.outputs.subnet_id }}"

          # Stagger start per instance (0-180s)
          STAGGER=$(( $(echo "$NAME" | grep -o '[0-9]') * 45 ))
          echo "Stagger delay: ${STAGGER}s for $NAME ($REGION)"
          sleep $STAGGER

          for round in $(seq 1 $MAX_ROUNDS); do
            JITTER=$((RANDOM % 120))
            sleep $JITTER

            echo "--- [$NAME@$REGION] Round $round/$MAX_ROUNDS ($(date '+%H:%M:%S')) ---"

            RESULT=$(oci compute instance launch \
              --compartment-id "${{ secrets.COMPARTMENT_ID }}" \
              --availability-domain "$AD" \
              --region "$REGION" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config "{\"ocpus\":${OCPUS},\"memoryInGBs\":${MEMORY}}" \
              --image-id "$IMAGE_ID" \
              --subnet-id "$SUBNET_ID" \
              --display-name "$NAME" \
              --assign-public-ip true \
              --boot-volume-size-in-gbs 50 \
              --metadata "{\"ssh_authorized_keys\":\"$(cat ~/.oci/ssh_key.pub)\"}" \
              2>&1 || true)

            if echo "$RESULT" | grep -q '"lifecycle-state"'; then
              INSTANCE_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")
              echo "========================================="
              echo "  INSTANCE CREATED: $NAME @ $REGION"
              echo "  ID: $INSTANCE_ID"
              echo "========================================="

              sleep 60
              VNIC_ID=$(oci compute vnic-attachment list \
                --compartment-id "${{ secrets.COMPARTMENT_ID }}" \
                --region "$REGION" \
                --instance-id "$INSTANCE_ID" \
                --query 'data[0]."vnic-id"' --raw-output 2>/dev/null || echo "")
              PUBLIC_IP="pending"
              if [ -n "$VNIC_ID" ] && [ "$VNIC_ID" != "null" ]; then
                PUBLIC_IP=$(oci network vnic get \
                  --vnic-id "$VNIC_ID" \
                  --region "$REGION" \
                  --query 'data."public-ip"' --raw-output 2>/dev/null || echo "pending")
              fi

              echo "  PUBLIC IP: $PUBLIC_IP"

              mkdir -p instances
              echo "$NAME $REGION $INSTANCE_ID $PUBLIC_IP $(date -u '+%Y-%m-%dT%H:%M:%SZ')" > "instances/${NAME}.created"
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git pull --rebase || true
              git add instances/
              git commit -m "instance: $NAME @ $REGION ($PUBLIC_IP)"
              git push
              exit 0

            elif echo "$RESULT" | grep -q "Too many requests"; then
              echo "  Rate limited"
              sleep $RATE_EXTRA

            elif echo "$RESULT" | grep -q "Out of host capacity"; then
              echo "  Out of capacity"

            elif echo "$RESULT" | grep -q "LimitExceeded"; then
              echo "  OCPU limit reached!"
              exit 0

            elif echo "$RESULT" | grep -q "NotAuthorizedOrNotFound"; then
              echo "  Region not subscribed — skipping"
              exit 0

            else
              MSG=$(echo "$RESULT" | grep -o '"message":"[^"]*"' | head -1)
              echo "  Error: $MSG"
            fi

            echo "  Waiting ${WAIT}s..."
            sleep $WAIT
          done

          echo "=== [$NAME] $MAX_ROUNDS rounds done ==="

      - name: Keepalive commit
        if: always()
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          if ([ "$HOUR" = "00" ] || [ "$HOUR" = "06" ] || [ "$HOUR" = "12" ] || [ "$HOUR" = "18" ]) && [ "$MINUTE" -lt "30" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git pull --rebase || true
            echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" > .keepalive
            git add .keepalive
            git commit -m "keepalive" || true
            git push || true
          fi
