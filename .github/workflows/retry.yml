name: OCI ARM Instance Retry

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

concurrency:
  group: oci-retry
  cancel-in-progress: false

jobs:
  create-instance:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Install OCI CLI
        run: pip install oci-cli --quiet 2>/dev/null

      - name: Setup OCI Config
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_CONFIG }}" > ~/.oci/config
          chmod 600 ~/.oci/config
          echo "${{ secrets.OCI_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          echo "${{ secrets.SSH_PUB_KEY }}" > ~/.oci/ssh_key.pub

      - name: Retry with backoff
        run: |
          MAX_ROUNDS=33  # 33 * 10min = 5.5 hours
          WAIT=600       # 10 min base
          RATE_EXTRA=600 # +10 min on rate limit

          for round in $(seq 1 $MAX_ROUNDS); do
            # Random jitter 0-120 seconds
            JITTER=$((RANDOM % 120))
            sleep $JITTER

            echo "--- Round $round/$MAX_ROUNDS ($(date '+%H:%M:%S')) jitter=${JITTER}s ---"

            RESULT=$(oci compute instance launch \
              --compartment-id "${{ secrets.COMPARTMENT_ID }}" \
              --availability-domain "${{ secrets.AD }}" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config '{"ocpus":4,"memoryInGBs":24}' \
              --image-id "${{ secrets.IMAGE_ID }}" \
              --subnet-id "${{ secrets.SUBNET_ID }}" \
              --display-name "btc-trade-main" \
              --assign-public-ip true \
              --boot-volume-size-in-gbs 50 \
              --metadata "{\"ssh_authorized_keys\":\"$(cat ~/.oci/ssh_key.pub)\"}" \
              2>&1 || true)

            if echo "$RESULT" | grep -q '"lifecycle-state"'; then
              INSTANCE_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])")
              echo "========================================="
              echo "  INSTANCE CREATED!"
              echo "  ID: $INSTANCE_ID"
              echo "========================================="

              sleep 60
              VNIC_ID=$(oci compute vnic-attachment list \
                --compartment-id "${{ secrets.COMPARTMENT_ID }}" \
                --instance-id "$INSTANCE_ID" \
                --query 'data[0]."vnic-id"' --raw-output 2>/dev/null || echo "")
              PUBLIC_IP="pending"
              if [ -n "$VNIC_ID" ] && [ "$VNIC_ID" != "null" ]; then
                PUBLIC_IP=$(oci network vnic get \
                  --vnic-id "$VNIC_ID" \
                  --query 'data."public-ip"' --raw-output 2>/dev/null || echo "pending")
              fi

              echo "  PUBLIC IP: $PUBLIC_IP"

              mkdir -p instances
              echo "btc-trade-main $INSTANCE_ID $PUBLIC_IP $(date -u '+%Y-%m-%dT%H:%M:%SZ')" > instances/btc-trade-main.created
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add instances/
              git commit -m "instance: btc-trade-main ($PUBLIC_IP)"
              git push
              exit 0

            elif echo "$RESULT" | grep -q "Too many requests"; then
              echo "  Rate limited — cooling down extra ${RATE_EXTRA}s"
              sleep $RATE_EXTRA

            elif echo "$RESULT" | grep -q "Out of host capacity"; then
              echo "  Out of capacity — normal retry"

            elif echo "$RESULT" | grep -q "LimitExceeded"; then
              echo "  OCPU limit reached — check OCI console for existing instances"
              exit 0

            else
              MSG=$(echo "$RESULT" | grep -o '"message":"[^"]*"' | head -1)
              echo "  Error: $MSG"
            fi

            echo "  Waiting ${WAIT}s..."
            sleep $WAIT
          done

          echo "=== $MAX_ROUNDS rounds done, instance not created ==="

      - name: Keepalive commit
        if: always()
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          if ([ "$HOUR" = "00" ] || [ "$HOUR" = "06" ] || [ "$HOUR" = "12" ] || [ "$HOUR" = "18" ]) && [ "$MINUTE" -lt "30" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" > .keepalive
            git add .keepalive
            git commit -m "keepalive" || true
            git push || true
          fi
